name: Perfai Actions
description: Active Performance for APIs (public, mobile, & web)
author: Perfai, Inc.

branding:
  icon: trending-up
  color: red

inputs:
  username:
    description: 'Perfai Username'
    required: true
  password:
    description: 'Perfai Password'
    required: true
  orgId:
    description: 'Organization ID'
    required: true
  catalogId:
    description: 'Catalog ID used for chain execution (security scan)'
    required: true
  appId:
    description: 'App ID used for fetching security issues'
    required: true
  wait-for-completion:
    description: 'Wait until Perfai scan completes. Set to `true` to block until done.'
    required: false
    default: "true"
  fail-on-new-leaks:
    description: 'Fail the build if new security leaks are found. Set to `true` to enable.'
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Grant execute permission for multiple-service-deploy.sh
      run: chmod +x ${GITHUB_ACTION_PATH}/multiple-service-deploy.sh
      shell: bash

    - name: Run Perfai Security Scan
      run: |
        ${GITHUB_ACTION_PATH}/multiple-service-deploy.sh \
          --username "${{ inputs.username }}" \
          --password "${{ inputs.password }}" \
          --orgId "${{ inputs.orgId }}" \
          --catalogId "${{ inputs.catalogId }}" \
          --appId "${{ inputs.appId }}" \
          --wait-for-completion "${{ inputs.wait-for-completion }}" \
          --fail-on-new-leaks "${{ inputs.fail-on-new-leaks }}"
      shell: bash
